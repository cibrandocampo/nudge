name: nudge-dev

services:

  db:
    image: postgres:${DOCKER_POSTGRES_VERSION:-17-alpine}
    entrypoint: ["sh", "-c"]
    command: ["docker-entrypoint.sh postgres -c log_min_messages=$${POSTGRES_LOG_LEVEL:-warning}"]
    env_file: ../.env
    # Host ports prefixed with "1" (e.g. 15432 vs 5432) so this dev
    # compose can coexist with other projects running services on the
    # standard ports. Internal docker network ports are unchanged —
    # services still talk to `db:5432`, `redis:6379`, `backend:8000`.
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nudge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nudge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:${DOCKER_REDIS_VERSION:-8-alpine}
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --loglevel "$${REDIS_LOG_LEVEL:-debug}"'
    env_file: ../.env
    ports:
      - "127.0.0.1:16379:6379"
    networks:
      - nudge_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local SMTP catcher + Web UI for inspecting outbound mail in dev.
  # Backend / Celery point their EMAIL_HOST at `mailpit:1025` (no auth).
  # The Web UI is exposed on http://localhost:18025 with search, full
  # MIME view, source view, and attachment inspection — open it after
  # any login/start request to see the rendered OTP email.
  mailpit:
    image: axllent/mailpit:latest
    environment:
      # Accept any SMTP credentials (or none) — we're not authenticating
      # in dev. Mailpit drops the message into its in-memory store.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "127.0.0.1:11025:1025"   # SMTP (host port only useful for manual smoke tests)
      - "127.0.0.1:18025:8025"   # Web UI — open this in the browser
    networks:
      - nudge_net

  backend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py ensure_admin &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: ../.env
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,host.docker.internal"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-nudge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nudge}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # SMTP for the email-OTP flow defaults to the local Mailpit
      # container, but every value falls back to whatever is in the
      # root `.env` so a developer can point at a real provider
      # (Gmail / Mailtrap / OVH / …) by setting `EMAIL_HOST=… etc.`
      # there without editing this file. `${VAR:-default}` reads the
      # value from compose's interpolation environment (--env-file
      # plus shell) and applies the default only when it is unset.
      EMAIL_BACKEND: "${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}"
      EMAIL_HOST: "${EMAIL_HOST:-mailpit}"
      EMAIL_PORT: "${EMAIL_PORT:-1025}"
      EMAIL_USE_TLS: "${EMAIL_USE_TLS:-False}"
      EMAIL_HOST_USER: "${EMAIL_HOST_USER:-}"
      EMAIL_HOST_PASSWORD: "${EMAIL_HOST_PASSWORD:-}"
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-Nudge <noreply@nudge.local>}"
      # Open self-signup by default in dev so the email-wizard registration
      # path is reachable without extra setup. Override to `False` in `.env`
      # if you want to test the admin-only login flow locally.
      ALLOW_SELF_SIGNUP: "${ALLOW_SELF_SIGNUP:-True}"
    volumes:
      - ../backend:/app
    ports:
      - "18000:8000"
    networks:
      - nudge_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ..
      dockerfile: dev/Dockerfile.backend
    command: sh -c 'celery -A nudge worker -B --loglevel=$${CELERY_LOG_LEVEL:-debug}'
    env_file: ../.env
    environment:
      DJANGO_DEBUG: "True"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-nudge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nudge}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # See backend service above — celery is what actually executes
      # `send_login_email`, so it must point at Mailpit (or whatever
      # provider .env overrides to) too.
      EMAIL_BACKEND: "${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}"
      EMAIL_HOST: "${EMAIL_HOST:-mailpit}"
      EMAIL_PORT: "${EMAIL_PORT:-1025}"
      EMAIL_USE_TLS: "${EMAIL_USE_TLS:-False}"
      EMAIL_HOST_USER: "${EMAIL_HOST_USER:-}"
      EMAIL_HOST_PASSWORD: "${EMAIL_HOST_PASSWORD:-}"
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-Nudge <noreply@nudge.local>}"
    volumes:
      - ../backend:/app
    networks:
      - nudge_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.frontend
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "0.0.0.0:15173:5173"
    networks:
      - nudge_net
    depends_on:
      - backend

  # Production-build preview server for offline E2E tests (T069–T071).
  # Vite dev serves JS modules on-the-fly and they are NOT precached by
  # the Service Worker — offline reload of the PWA breaks. This service
  # runs `vite build` + `vite preview` so the SW's precache manifest
  # contains every hashed asset, and the app reloads fully offline.
  #
  # Gated behind the `preview` profile so the normal dev workflow does
  # not pay for a ~30s build on every `up`. Bring it up explicitly:
  #
  #   docker compose -f dev/docker-compose.yml --env-file .env \
  #     --profile preview up -d frontend-preview
  frontend-preview:
    build:
      context: ..
      dockerfile: dev/Dockerfile.frontend
    profiles: ["preview"]
    command: sh -c "npm run build && npx vite preview --host --port 4173"
    environment:
      # Unlocks the dev-only E2E hooks (__NUDGE_REACHABILITY_SET__, etc.)
      # in an otherwise production build. Set at build time so Vite bakes
      # the flag into the compiled bundle. Not used by the plain frontend
      # service (it runs in dev mode already).
      VITE_E2E_MODE: "true"
    volumes:
      - ../frontend:/app
      - frontend_preview_node_modules:/app/node_modules
    ports:
      - "0.0.0.0:14173:4173"
    networks:
      - nudge_net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://localhost:4173/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  nudge_net:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_preview_node_modules:
