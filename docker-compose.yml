services:

  db:
    image: postgres:${DOCKER_POSTGRES_VERSION:-16-alpine}
    container_name: "${PROJECT_NAME:-nudge}-db"
    init: true
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nudge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nudge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    restart: unless-stopped

  redis:
    image: redis:${DOCKER_REDIS_VERSION:-7-alpine}
    container_name: "${PROJECT_NAME:-nudge}-redis"
    init: true
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - nudge_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme} ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /data
    restart: unless-stopped

  backend:
    image: cibrandocampo/nudge-backend:${DOCKER_NUDGE_VERSION:-stable}
    container_name: "${PROJECT_NAME:-nudge}-backend"
    init: true
    command: gunicorn nudge.wsgi:application --bind 0.0.0.0:${BACKEND_PORT:-8000} --workers ${GUNICORN_WORKERS:-2}
    env_file: .env
    networks:
      - nudge_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${BACKEND_PORT:-8000}/api/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped

  celery:
    image: cibrandocampo/nudge-backend:${DOCKER_NUDGE_VERSION:-stable}
    container_name: "${PROJECT_NAME:-nudge}-celery"
    init: true
    command: celery -A nudge worker -B --loglevel=${CELERY_LOG_LEVEL:-info}
    env_file: .env
    networks:
      - nudge_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A nudge inspect ping --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped

  frontend:
    image: cibrandocampo/nudge-frontend:${DOCKER_NUDGE_VERSION:-stable}
    container_name: "${PROJECT_NAME:-nudge}-frontend"
    init: true
    ports:
      - "${NUDGE_HTTP_PORT:-80}:80"
    networks:
      - nudge_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    restart: unless-stopped

networks:
  nudge_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${DATA_PATH:-./data}"
