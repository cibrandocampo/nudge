[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501"]

[tool.coverage.run]
source = ["apps", "nudge"]
branch = false
# Patterns use fnmatch — `*` does NOT cross `/`, so multi-segment paths
# (e.g. `apps/routines/tests.py`) need `**/` to match the prefix.
omit = [
    "**/migrations/*",
    "**/tests.py",
    "**/tests/*",
    "manage.py",
    # Seeds / test fixtures — code designed to GENERATE test data, not
    # production logic. Counting them would equal measuring the coverage
    # of the tests' own helpers.
    "**/seed_e2e.py",
    "**/seed_demo.py",
    "**/ensure_e2e_users.py",
    "**/generate_vapid_keys.py",
    # Production entry points — no testable logic.
    "**/wsgi.py",
    "**/asgi.py",
]

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = false
exclude_also = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
